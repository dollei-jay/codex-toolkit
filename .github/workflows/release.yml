name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build Windows release bundles
        run: npm run build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-token-viewer-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-token-viewer-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Windows assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true

  build-macos-release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build macOS release bundles
        run: npm run build

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-token-viewer-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload macOS app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-token-viewer-macos-app
          path: src-tauri/target/release/bundle/macos/*.app

      - name: Upload macOS assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
